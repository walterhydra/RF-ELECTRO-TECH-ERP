version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pcb_erp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pcb_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pcb_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcb_erp_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/pcb_erp?schema=public"
      JWT_SECRET: "rfelectro_production_jwt_secret_key_2026_super_secure"
      PORT: 3001
      CORS_ORIGINS: "http://localhost:3000,http://localhost,http://127.0.0.1"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcb_erp_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:3001/api/v1"
      NEXT_PUBLIC_PORTAL_API_URL: "http://localhost:3001/api/v1/portal"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
